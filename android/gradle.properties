# Optimized memory settings
org.gradle.jvmargs=-Xmx4G -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# AndroidX is required for most modern plugins like Razorpay
android.useAndroidX=true
android.enableJetifier=true

# Speeds up builds
org.gradle.parallel=true
org.gradle.caching=true